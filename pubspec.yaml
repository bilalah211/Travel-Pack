version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:

  flutter:
    sdk: flutter
  #----------Packages--------#
  cupertino_icons: ^1.0.8

  #Animation
  lottie: ^3.3.1

  #Firebase
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2

  #Notification
  flutter_local_notifications: ^19.5.0

