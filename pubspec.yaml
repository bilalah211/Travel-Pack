  uuid: ^4.5.1

  #Icons
  iconsax: ^0.0.8

  #Effects
  shimmer: ^3.0.0

  #Time And Date
  intl: ^0.20.2

  #Share Link
  share_plus: ^12.0.0

  #Carousile Slider
  carousel_slider: ^5.1.1

  #Statemanagment
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter



flutter:
